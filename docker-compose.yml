name: payment-system

services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-payment_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-payment_system}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-system-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'

  nginx:
    image: nginx:1.27-alpine
    container_name: payment-system-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
